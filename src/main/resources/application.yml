spring:
  application:
    name: zm-scpro-message-receiver

  r2dbc:
    url: r2dbc:sqlserver://${DB_HOST:172.16.2.12}:${DB_PORT:1433};databaseName=${DB_NAME:CareProLive}
    username: ${DB_USERNAME:sa}
    password: ${DB_PASSWORD:abcd123!}
    properties:
      sslEnabled: false

  grpc:
    server:
      port: ${GRPC_PORT:9090}

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always

logging:
  level:
    zm.gov.moh.zmscpromessagereceiver: INFO
